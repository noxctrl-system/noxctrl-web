<!DOCTYPE html>
<html lang="de">
<head>
  <meta name="theme-color" content="#0b1220" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Center</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="race-page">

  <main class="race-shell">
    <header class="race-header">
      <button class="back-button" onclick="window.location.href='index.html'">‹</button>
      <h1>Race Center</h1>
    </header>

    <section class="glass-card">
      <h2>Modes</h2>
      <div class="mode-stack">
        <button class="mode-button active" data-mode="off">Nos-Control deaktiviert</button>
        <button class="mode-button" data-mode="run">Rennbetrieb</button>
        <button class="mode-button" data-mode="delayed" id="openDelayedStartButton">Verzögerter Rennbetrieb</button>
      </div>
    </section>

    <section class="glass-card">
      <h2>Unterbrechungen</h2>
      <div class="toggle-row">
        <span id="disturbanceStatus">Aus</span>
        <button id="disturbanceButton" class="toggle-button">Konfigurieren</button>
      </div>
    </section>

    <section class="glass-card">
      <h2>Verbindungen</h2>
      <p class="card-subtext">Nach Modulen suchen und Parameter auslesen.</p>

      <div class="connection-top">
        <button class="scan-button" onclick="mockScan()">Suchen / Auslesen</button>
        <div class="connection-status">
          <span id="scanStatusDot" class="status-dot yellow"></span>
          <span id="scanStatusText">Bereit</span>
        </div>
      </div>

      <div class="table-wrap">
        <table class="params-table">
          <thead>
            <tr>
              <th>Senden</th>
              <th>G (sek)</th>
              <th>K (sek)</th>
              <th>L (sek)</th>
              <th>W (%)</th>
            </tr>
          </thead>
          <tbody id="boxTableBody">
          </tbody>
        </table>
      </div>
    </section>
  </main>
  
  <div id="delayedStartModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>

    <div class="modal-header">
      <h2>Verzögerter Start</h2>
      <button class="modal-close-button" id="closeDelayedStartButton">Abbrechen</button>
    </div>

    <div class="modal-section">
      <label class="modal-label" for="driversRange">Teilnehmende Fahrer</label>

      <div class="range-row">
        <input
          id="driversRange"
          class="drivers-range"
          type="range"
          min="1"
          max="32"
          step="1"
          value="12"
        />
        <span id="driversValue">12</span>
      </div>
    </div>

    <div class="modal-section">
      <label class="modal-label">Start nach Runden</label>

      <div class="stepper-row">
        <button class="stepper-button" id="lapsMinusButton">−</button>
        <span id="lapsValue" class="stepper-value">5</span>
        <button class="stepper-button" id="lapsPlusButton">+</button>
      </div>

      <p class="modal-hint">
        Start erfolgt nach <span id="targetPassesValue">60</span> Passes
        (Fahrer × Runden).
      </p>
    </div>

    <button class="modal-start-button" id="delayedStartConfirmButton">
      Starten
    </button>
  </div>
</div>

  <div id="disturbanceModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>

    <div class="modal-header">
      <h2>Unterbrechungen</h2>
      <button class="modal-close-button" id="closeDisturbanceButton">Abbrechen</button>
    </div>

    <div class="modal-section">
      <label class="modal-label">Aktiv</label>
      <div class="toggle-pill-row">
        <button id="distEnabledOff" class="pill-button active">Aus</button>
        <button id="distEnabledOn" class="pill-button">Ein</button>
      </div>
    </div>

    <div class="modal-section">
      <label class="modal-label" for="distProbabilityRange">Wahrscheinlichkeit (%)</label>
      <div class="range-row">
        <input
          id="distProbabilityRange"
          class="drivers-range"
          type="range"
          min="0"
          max="100"
          step="5"
          value="40"
        />
        <span id="distProbabilityValue" class="range-value">40</span>
      </div>
    </div>

    <div class="modal-section">
      <label class="modal-label">Auslösung nach Minuten</label>
      <div class="stepper-row">
        <button class="stepper-button" id="distMinutesMinus">−</button>
        <span id="distMinutesValue" class="stepper-value">10</span>
        <button class="stepper-button" id="distMinutesPlus">+</button>
      </div>
    </div>

    <div class="modal-section">
      <label class="modal-label">Dauer von / bis Sekunden</label>
      <div class="dual-stepper-grid">
        <div>
          <div class="mini-label">Von</div>
          <div class="stepper-row">
            <button class="stepper-button" id="distMinMinus">−</button>
            <span id="distMinValue" class="stepper-value">20</span>
            <button class="stepper-button" id="distMinPlus">+</button>
          </div>
        </div>

        <div>
          <div class="mini-label">Bis</div>
          <div class="stepper-row">
            <button class="stepper-button" id="distMaxMinus">−</button>
            <span id="distMaxValue" class="stepper-value">60</span>
            <button class="stepper-button" id="distMaxPlus">+</button>
          </div>
        </div>
      </div>

      <p class="modal-hint">
        Geplantes Format: <span id="distConfigPreview">DISTCFG=0,40,10,20,60</span>
      </p>
    </div>

    <button class="modal-start-button" id="disturbanceConfirmButton">
      Übernehmen
    </button>
  </div>
</div>
  
<script src="app.js"></script>
</body>
</html>
