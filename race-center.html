<!DOCTYPE html>
<html lang="de">
<head>
  <meta name="theme-color" content="#0b1220" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Center</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="race-page">

  <main class="race-shell">
    <header class="race-header">
      <button class="back-button" onclick="window.location.href='index.html'">‹</button>
      <h1>Race Center</h1>
    </header>

    <section class="glass-card">
      <h2>Modes</h2>
      <div class="mode-stack">
        <button class="mode-button active" data-mode="off">Nos-Control deaktiviert</button>
        <button class="mode-button" data-mode="run">Rennbetrieb</button>
        <button class="mode-button" data-mode="delayed" id="openDelayedStartButton">Verzögerter Rennbetrieb</button>
      </div>
    </section>

    <section class="glass-card">
      <h2>Unterbrechungen</h2>
      <div class="toggle-row">
        <span id="disturbanceStatus">Aus</span>
        <button id="disturbanceButton" class="toggle-button" onclick="toggleDisturbance()">Aktivieren</button>
      </div>
    </section>

    <section class="glass-card">
      <h2>Verbindungen</h2>
      <p class="card-subtext">Nach Modulen suchen und Parameter auslesen.</p>

      <div class="connection-top">
        <button class="scan-button" onclick="mockScan()">Suchen / Auslesen</button>
        <div class="connection-status">
          <span id="scanStatusDot" class="status-dot yellow"></span>
          <span id="scanStatusText">Bereit</span>
        </div>
      </div>

      <div class="table-wrap">
        <table class="params-table">
          <thead>
            <tr>
              <th>Senden</th>
              <th>G (sek)</th>
              <th>K (sek)</th>
              <th>L (sek)</th>
              <th>W (%)</th>
            </tr>
          </thead>
          <tbody id="boxTableBody">
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  
  <div id="delayedStartModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>

    <div class="modal-header">
      <h2>Verzögerter Start</h2>
      <button class="modal-close-button" id="closeDelayedStartButton">Abbrechen</button>
    </div>

    <div class="modal-section">
      <label class="modal-label" for="driversRange">Teilnehmende Fahrer</label>

      <div class="range-row">
        <input
          id="driversRange"
          class="drivers-range"
          type="range"
          min="1"
          max="32"
          step="1"
          value="12"
        />
        <span id="driversValue">12</span>
      </div>
    </div>

    <div class="modal-section">
      <label class="modal-label">Start nach Runden</label>

      <div class="stepper-row">
        <button class="stepper-button" id="lapsMinusButton">−</button>
        <span id="lapsValue" class="stepper-value">5</span>
        <button class="stepper-button" id="lapsPlusButton">+</button>
      </div>

      <p class="modal-hint">
        Start erfolgt nach <span id="targetPassesValue">60</span> Passes
        (Fahrer × Runden).
      </p>
    </div>

    <button class="modal-start-button" id="delayedStartConfirmButton">
      Starten
    </button>
  </div>
</div>
  
</body>
</html>
