<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Center</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

  <h2>Race Center</h2>

  <!-- MODES -->
  <div class="card">
    <h3>Modes</h3>

    <button class="mode active">Nos-Control deaktiviert</button>
    <button class="mode">Rennbetrieb</button>
    <button class="mode">Verzögerter Rennbetrieb</button>
  </div>

  <!-- UNTERBRECHUNGEN -->
  <div class="card">
    <h3>Unterbrechungen</h3>

    <button id="disturbanceBtn" onclick="toggleDisturbance()">
      AUS
    </button>
  </div>

  <!-- VERBINDUNGEN -->
  <div class="card">
    <h3>Verbindungen</h3>

    <button onclick="scan()">Suchen / Auslesen</button>
    <p id="status">Bereit</p>

    <table>
      <tr>
        <th>Senden</th>
        <th>G</th>
        <th>K</th>
        <th>L</th>
        <th>W</th>
      </tr>

      <tr>
        <td><button>Senden</button></td>
        <td>8</td>
        <td>1</td>
        <td>3</td>
        <td>50</td>
      </tr>

    </table>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
